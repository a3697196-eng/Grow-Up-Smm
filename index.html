<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grow Up SMM Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🚀 SMM</h2>

    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('order')">New Order</button>
    <button onclick="showPage('funds')">Add Funds</button>
    <button onclick="showPage('orders')">Orders</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="page">
      <h2>Dashboard</h2>
      <h3>Balance: ₹<span id="balance">1000</span></h3>
    </div>

    <!-- NEW ORDER -->
    <div id="order" class="page" style="display:none;">
      <h2>New Order</h2>

      <select id="service">
        <option value="100">Instagram Followers - ₹100/1000</option>
        <option value="50">YouTube Views - ₹50/1000</option>
      </select>

      <input type="text" id="link" placeholder="Enter Link">
      <input type="number" id="qty" placeholder="Quantity">

      <button onclick="placeOrder()">Place Order</button>
    </div>

    <!-- ADD FUNDS -->
    <div id="funds" class="page" style="display:none;">
      <h2>Add Funds</h2>

      <input type="number" id="amount" placeholder="Enter Amount">
      <button onclick="generateQR()">Generate QR</button>

      <canvas id="qr"></canvas>
    </div>

    <!-- ORDERS -->
    <div id="orders" class="page" style="display:none;">
      <h2>Orders</h2>
      <ul id="ordersList"></ul>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="app.js"></script>

</body>
</html>
