<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grow Up SMM Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🚀 GrowUp</h2>

    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('order')">New Order</button>
    <button onclick="showPage('funds')">Add Funds</button>
    <button onclick="showPage('orders')">Orders</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h2>Grow Up SMM Panel</h2>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="page">
      <div class="cards">
        <div class="card">Balance ₹<span id="balance">0</span></div>
        <div class="card">Orders <span id="totalOrders">0</span></div>
      </div>
    </div>

    <!-- ORDER -->
    <div id="order" class="page">
      <h2>New Order</h2>

      <select id="service">
        <option value="100">Instagram Followers - ₹100/1000</option>
        <option value="50">YouTube Views - ₹50/1000</option>
      </select>

      <input id="link" placeholder="Enter Link">
      <input id="qty" type="number" placeholder="Quantity">

      <button onclick="placeOrder()">Place Order</button>
    </div>

    <!-- FUNDS -->
    <div id="funds" class="page">
      <h2>Add Funds</h2>

      <input id="amount" type="number" placeholder="Amount">
      <button onclick="generateQR()">Generate QR</button>

      <canvas id="qr"></canvas>
    </div>

    <!-- ORDERS -->
    <div id="orders" class="page">
      <h2>Orders</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Service</th>
            <th>Qty</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="app.js"></script>

</body>
</html>
