<div id="dashboard" style="display:none;">

  <h2>Dashboard</h2>

  <p id="userInfo"></p>
  <h3>Balance: ₹<span id="balance">0</span></h3>

  <hr>

  <h3>New Order</h3>

  <select id="service">

  <button onclick="placeOrder()">Place Order</button>

</div>
